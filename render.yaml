services:
  - type: web
    name: lawyers-legal-documentation-app
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT --app-dir .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EXTRACTION_MODEL
        value: claude-sonnet-4-6
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    plan: free
